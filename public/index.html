<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>InvestPro Kenya</title>

<style>

body{
font-family:Arial;
background:#f4f5f7;
padding:30px;
}

.box{
background:white;
padding:30px;
border-radius:20px;
max-width:400px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:18px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:#16a34a;
color:white;
font-size:20px;
cursor:pointer;
}

h1{
text-align:center;
color:#16a34a;
}

</style>
</head>

<body>

<div class="box">

<h1>InvestPro Kenya</h1>

<input
type="text"
id="phone"
placeholder="07XXXXXXXX">

<input
type="number"
id="amount"
placeholder="Amount">

<button onclick="payNow()">
Deposit via M-Pesa
</button>

</div>

<script>

async function payNow(){

const phone =
document.getElementById('phone').value;

const amount =
document.getElementById('amount').value;

if(!phone || !amount){

alert('Enter phone and amount');

return;

}

try{

const response = await fetch(
'/stkpush',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
phone,
amount
})
}
);

const data = await response.json();

console.log(data);

if(data.ResponseCode === "0"){

alert(
'STK Push sent successfully. Check your phone.'
);

}else{

alert(
'Failed: ' +
(data.ResponseDescription || 'Unknown error')
);

}

}catch(error){

console.log(error);

alert('Server error');

}

}

</script>

</body>
</html>
